<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TranspoBot — Assistant IA Transport</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  color: #1e293b;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #1a56db, #6366f1);
  color: white;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 6px 30px rgba(79,70,229,0.35);
}

.hdr-icon {
  width: 46px; height: 46px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  backdrop-filter: blur(8px);
}

header h1 { font-size: 1.3rem; font-weight: 700; }
header small { font-size: 0.75rem; opacity: 0.8; }

.hdr-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 14px;
}

.live-dot {
  width: 7px; height: 7px;
  background: #4ade80;
  border-radius: 50%;
}

/* TABS */
.tabs {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #e2e8f0;
  padding: 0 1.5rem;
  display: flex;
  overflow-x: auto;
}

.tab-btn {
  padding: 0.85rem 1.3rem;
  border: none;
  background: none;
  cursor: pointer;
  color: #64748b;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}

.tab-btn:hover {
  color: #4f46e5;
  background: rgba(99,102,241,0.08);
}

.tab-btn.active {
  color: #4f46e5;
  border-bottom-color: #4f46e5;
  font-weight: 600;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,2fr);
  gap: 1.2rem;
  padding: 1.2rem;
  max-width: 1400px;
  margin: auto;
}

.container-full {
  padding: 1.2rem;
  max-width: 1400px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 1.2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: all 0.25s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 50px rgba(79,70,229,0.25);
}

/* STATS */
.stat {
  background: linear-gradient(135deg, #dbeafe, #eef2ff);
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}

.stat .val {
  font-size: 1.6rem;
  font-weight: bold;
  color: #4f46e5;
}

/* TABLE */
.results table { width: 100%; border-collapse: collapse; }

.results th {
  background: linear-gradient(135deg, #4f46e5, #1a56db);
  color: white;
  padding: 0.5rem;
}

.results td {
  padding: 0.5rem;
}

.results tr:hover td {
  background: #eef2ff;
}

/* CHAT */
.chat-box {
  height: 400px;
  overflow-y: auto;
  border-radius: 12px;
  padding: 1rem;
  background: linear-gradient(180deg, #f8fafc, #eef2ff);
}

.msg.user .bubble {
  background: linear-gradient(135deg, #4f46e5, #1a56db);
  color: white;
}

.msg.bot .bubble {
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.bubble {
  padding: 0.6rem 1rem;
  border-radius: 16px;
}

/* INPUT */
.chat-input input {
  border-radius: 10px;
  padding: 0.6rem;
}

.chat-input button {
  background: linear-gradient(135deg, #4f46e5, #1a56db);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 0.6rem 1rem;
}

/* VEHICLES / DRIVERS */
.vehicle-card, .driver-card {
  background: rgba(255,255,255,0.85);
  border-radius: 12px;
  padding: 1rem;
  transition: 0.2s;
}

.vehicle-card:hover, .driver-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(99,102,241,0.2);
}

.driver-avatar {
  background: linear-gradient(135deg, #4f46e5, #1a56db);
  color: white;
}

/* SCROLL */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb {
  background: #c7d2fe;
  border-radius: 10px;
}
</style>
</head>
